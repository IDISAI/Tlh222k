name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { app: web, project: WEB }
          - { app: admin, project: ADMIN }
          - { app: super-admin, project: SUPER_ADMIN }
          - { app: svc-api, project: SVC_API }
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[format('VERCEL_PROJECT_ID_{0}', matrix.project)] }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || github.token }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Sync the Postgres schema before deploying svc-api so prod DB never drifts
      # behind the deployed code (missing columns/tables => 500s). Additive push.
      # DATABASE_URL comes from the PROD_DATABASE_URL secret — the Neon integration
      # keeps the runtime URL out of `vercel pull`, so it must be provided here.
      # db push needs a direct (non-pooled) connection; derive it from the pooled
      # URL when PROD_DIRECT_URL is unset (Neon direct host = pooled minus -pooler).
      - if: matrix.app == 'svc-api'
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "PROD_DATABASE_URL secret not set — skipping schema sync"; exit 0
          fi
          : "${DIRECT_URL:=${DATABASE_URL/-pooler./.}}"
          export DIRECT_URL
          pnpm -F @workspace/db db:push

      - run: pnpm dlx vercel@54.21.1 pull --yes --environment=production --token="$VERCEL_TOKEN"

      - run: pnpm dlx vercel@54.21.1 build --prod --token="$VERCEL_TOKEN"

      - run: pnpm dlx vercel@54.21.1 deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  github-release:
    needs: [deploy] # waits for all frontend + svc-api matrix legs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
