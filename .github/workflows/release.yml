name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

# App deploys are handled by Vercel's native Git integration (push to main =>
# production). This workflow only runs the Postgres schema sync and cuts the
# GitHub release — it must NOT `vercel deploy`, or its CLI build (which lacks the
# project's NEXT_PUBLIC_* env, e.g. the Clerk publishable key) overwrites the good
# native production deployment with a broken one.
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || github.token }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Keep the prod Postgres schema in sync with the deployed svc-api code
      # (missing columns/tables => 500s). Additive push. DATABASE_URL comes from
      # the PROD_DATABASE_URL secret (the Neon integration keeps the runtime URL
      # out of `vercel pull`). Derives a direct (non-pooled) connection when
      # PROD_DIRECT_URL is unset; skips when no DB secret is set.
      - env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "PROD_DATABASE_URL secret not set — skipping schema sync"; exit 0
          fi
          : "${DIRECT_URL:=${DATABASE_URL/-pooler./.}}"
          export DIRECT_URL
          pnpm -F @workspace/db db:push

  github-release:
    needs: [migrate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
