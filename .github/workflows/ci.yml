name: CI

on:
  pull_request:
  push:
    branches: [main, develop, "release/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # SUBMODULE_PAT: PAT with read access to the submodule repos (IDISAI/*).
          # Falls back to github.token, which only works if the submodules are public.
          token: ${{ secrets.SUBMODULE_PAT || github.token }}

      - uses: pnpm/action-setup@v4 # version read from "packageManager" in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm build
