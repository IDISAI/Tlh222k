name: Deploy Staging

on:
  push:
    branches: [develop, "release/**"]

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: # project = suffix of secret VERCEL_PROJECT_ID_<PROJECT> (hyphens not allowed in secret names)
          - { app: web, project: WEB }
          - { app: admin, project: ADMIN }
          - { app: super-admin, project: SUPER_ADMIN }
          - { app: svc-notion, project: SVC_NOTION }
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[format('VERCEL_PROJECT_ID_{0}', matrix.project)] }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || github.token }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm dlx vercel@latest pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - run: pnpm dlx vercel@latest build --token="$VERCEL_TOKEN"

      - run: pnpm dlx vercel@latest deploy --prebuilt --token="$VERCEL_TOKEN"
