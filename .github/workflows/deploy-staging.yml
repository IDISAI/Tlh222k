name: Deploy Staging

on:
  push:
    branches: [develop, "release/**"]

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Preview deploys are handled by Vercel's native Git integration (push to develop
# => preview). This workflow only syncs the preview Postgres schema — it must NOT
# `vercel deploy`, or its CLI build (missing the project's NEXT_PUBLIC_* env)
# overwrites the good native preview deployment with a broken one.
jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || github.token }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Keep the preview Postgres schema in sync with the deployed svc-api code.
      # DATABASE_URL comes from the STAGING_DATABASE_URL secret (Neon integration
      # keeps the runtime URL out of `vercel pull`). Skips when the secret is unset
      # so develop deploys never break. Derives a direct connection when needed.
      - env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "STAGING_DATABASE_URL secret not set — skipping schema sync"; exit 0
          fi
          : "${DIRECT_URL:=${DATABASE_URL/-pooler./.}}"
          export DIRECT_URL
          pnpm -F @workspace/db db:push
