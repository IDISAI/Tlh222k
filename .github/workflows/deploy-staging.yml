name: Deploy Staging

on:
  push:
    branches: [develop, "release/**"]

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: # project = suffix of secret VERCEL_PROJECT_ID_<PROJECT> (hyphens not allowed in secret names)
          - { app: web, project: WEB }
          - { app: admin, project: ADMIN }
          - { app: super-admin, project: SUPER_ADMIN }
          - { app: svc-api, project: SVC_API }
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[format('VERCEL_PROJECT_ID_{0}', matrix.project)] }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT || github.token }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Keep the preview Postgres schema in sync with the deployed svc-api code.
      # DATABASE_URL comes from the STAGING_DATABASE_URL secret (Neon integration
      # keeps the runtime URL out of `vercel pull`). Skips when the secret is unset
      # so develop deploys never break. Derives a direct connection when needed.
      - if: matrix.app == 'svc-api'
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "STAGING_DATABASE_URL secret not set — skipping schema sync"; exit 0
          fi
          : "${DIRECT_URL:=${DATABASE_URL/-pooler./.}}"
          export DIRECT_URL
          pnpm -F @workspace/db db:push

      - run: pnpm dlx vercel@54.21.1 pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - run: pnpm dlx vercel@54.21.1 build --token="$VERCEL_TOKEN"

      - run: pnpm dlx vercel@54.21.1 deploy --prebuilt --token="$VERCEL_TOKEN"
