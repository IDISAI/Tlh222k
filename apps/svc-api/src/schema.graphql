enum NodeType {
  role
  skill
  chapter
  article
}

enum ArticleType {
  notion
  jupyter
}

enum NodeStatus {
  locked
  in_progress
  done
}

type Roadmap {
  id: ID!
  slug: String!
  title: String!
  description: String
  thumbnailUrl: String
  isPublished: Boolean!
  nodeCount: Int!
  createdAt: String
  updatedAt: String
}

type RoadmapNode {
  id: ID!
  roadmapId: ID!
  parentId: ID
  title: String!
  slug: String!
  description: String
  nodeType: NodeType!
  notionPageId: String
  articleType: ArticleType
  jupyterUrl: String
  positionX: Float!
  positionY: Float!
  order: Int!
  status: NodeStatus!
  isDeleted: Boolean!
  childrenCount: Int!
  linkedRoadmapId: ID
  isPublished: Boolean!
}

type RoadmapGraph {
  roadmap: Roadmap!
  nodes: [RoadmapNode!]!
}

type RoadmapProgress {
  roadmapId: ID!
  roadmapTitle: String!
  doneCount: Int!
  totalCount: Int!
}

type NotionDoc {
  id: ID!
  slug: String
  title: String!
  authorId: String!
  isArchived: Boolean!
  parentDocumentId: ID
  content: String
  coverImage: String
  icon: String
  isPublished: Boolean!
  position: Int!
  createdAt: String!
  updatedAt: String!
}

type Query {
  roadmaps(includeUnpublished: Boolean = false): [Roadmap!]!
  roadmap(slug: String!): Roadmap
  roadmapGraph(slug: String!): RoadmapGraph
  roadmapGraphById(id: ID!): RoadmapGraph
  allNodes: [RoadmapNode!]!
  myProgress: [RoadmapProgress!]!
  notionDoc(id: ID!): NotionDoc
  notionDocBySlug(slug: String!): NotionDoc
  notionChildren(parentDocumentId: ID!): [NotionDoc!]!
  notionTrash: [NotionDoc!]!
  notionSearch: [NotionDoc!]!
}

type Mutation {
  createRoadmap(input: CreateRoadmapInput!): Roadmap!
  updateRoadmap(id: ID!, input: UpdateRoadmapInput!): Roadmap!
  deleteRoadmap(id: ID!): Boolean!
  createNode(input: CreateNodeInput!): RoadmapNode!
  updateNode(id: ID!, input: UpdateNodeInput!): RoadmapNode!
  deleteNode(id: ID!): Boolean!
  saveRoadmap(roadmapId: ID!, nodes: [NodeInput!]!): Boolean!
  setNodeStatus(nodeId: ID!, status: NodeStatus!): Boolean!
  createNotionDoc(input: CreateNotionDocInput!): NotionDoc!
  updateNotionDoc(input: UpdateNotionDocInput!): NotionDoc!
  archiveNotionDoc(id: ID!): Boolean!
  restoreNotionDoc(id: ID!): Boolean!
  removeNotionDoc(id: ID!): Boolean!
  moveNotionDoc(id: ID!, parentDocumentId: ID): NotionDoc!
  reorderNotionDocs(parentDocumentId: ID!, orderedIds: [ID!]!): Boolean!
  removeNotionIcon(id: ID!): NotionDoc!
  removeNotionCover(id: ID!): NotionDoc!
}

input CreateNotionDocInput {
  title: String
  parentDocumentId: ID
  slug: String
}

input UpdateNotionDocInput {
  id: ID!
  title: String
  content: String
  icon: String
  coverImage: String
  isPublished: Boolean
}

input CreateRoadmapInput {
  slug: String!
  title: String!
  description: String
  thumbnailUrl: String
}

input UpdateRoadmapInput {
  title: String
  description: String
  thumbnailUrl: String
  isPublished: Boolean
}

input CreateNodeInput {
  roadmapId: ID!
  parentId: ID
  title: String!
  nodeType: NodeType!
  slug: String
  description: String
  notionPageId: String
  articleType: ArticleType
  jupyterUrl: String
  positionX: Float!
  positionY: Float!
  order: Int
}

input UpdateNodeInput {
  title: String
  description: String
  articleType: ArticleType
  notionPageId: String
  jupyterUrl: String
  positionX: Float
  positionY: Float
  order: Int
  parentId: ID
  linkedRoadmapId: ID
  isPublished: Boolean
}

input NodeInput {
  id: ID!
  parentId: ID
  positionX: Float!
  positionY: Float!
}
